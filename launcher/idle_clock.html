<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Screen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e0e7ff;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .center-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .time {
            font-size: 30vmin;
            font-weight: bold;
            color: #e0e7ff;
            letter-spacing: -0.5vmin;
        }

        .date {
            font-size: 5vmin;
            font-weight: 300;
            color: #94a3b8;
            margin-top: 2vmin;
            letter-spacing: 0.1vmin;
        }

        .mode-selector {
            margin-top: 5vh;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(30, 41, 59, 0.7);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .mode-label {
            font-size: 1.1rem;
            font-weight: 500;
            color: #94a3b8;
            min-width: 140px;
            text-align: right;
            transition: color 0.3s;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #475569;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #3b82f6;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .logo {
            position: absolute;
            bottom: 4vmin;
            right: 4vmin;
            width: 25vmin;
            max-width: 300px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .logo:hover {
            opacity: 1;
        }

        /* Плавное появление */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        body {
            animation: fadeIn 0.5s ease-in;
        }
    </style>
</head>

<body>
    <div class="center-content">
        <div class="time" id="time">21:47</div>
        <div class="date" id="date">Пятница, 7 февраля</div>
        <div class="mode-selector">
            <span class="mode-label" id="mode-text">Режим простоя</span>
            <label class="switch">
                <input type="checkbox" id="mode-toggle" checked>
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <img src="ktm_colored.png" alt="Logo" class="logo">

    <script>
        // Обновление времени
        function updateTime() {
            const now = new Date();

            // Время
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('time').textContent = `${hours}:${minutes}`;

            // Дата
            const dayNames = ['Воскресенье', 'Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
            const monthNames = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня',
                'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];

            const dayName = dayNames[now.getDay()];
            const day = now.getDate();
            const monthName = monthNames[now.getMonth()];

            document.getElementById('date').textContent = `${dayName}, ${day} ${monthName}`;
        }

        // Запускаем обновления
        updateTime();
        setInterval(updateTime, 1000);

        // Логика переключателя
        const toggle = document.getElementById('mode-toggle');
        const label = document.getElementById('mode-text');
        toggle.addEventListener('change', function() {
            if (!this.checked) {
                label.textContent = 'Переход к работе...';
                label.style.color = '#3b82f6';
                setTimeout(() => {
                    if (window.chrome && window.chrome.webview) {
                        window.chrome.webview.postMessage('toggle_idle');
                    }
                }, 150);
            } else {
                label.textContent = 'Режим простоя';
                label.style.color = '#94a3b8';
            }
        });
    </script>
</body>

</html>
